name: Build Windows EXE

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6==6.11.1 pyinstaller==6.20.0 requests

      - name: Build executable with PyInstaller
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onedir
          --windowed
          --name WingetGUI
          --collect-submodules src
          --exclude-module PySide6.QtNetwork
          --exclude-module PySide6.QtQml
          --exclude-module PySide6.QtQuick
          --exclude-module PySide6.QtMultimedia
          --exclude-module PySide6.QtWebEngineCore
          --exclude-module PySide6.QtWebEngineWidgets
          --exclude-module PySide6.QtPdf
          --exclude-module PySide6.Qt3DCore
          --exclude-module tkinter
          --exclude-module unittest
          main.py

      - name: Zip release folder
        shell: pwsh
        run: Compress-Archive -Path dist/WingetGUI/* -DestinationPath dist/WingetGUI-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WingetGUI-windows
          path: dist/WingetGUI-windows.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WingetGUI-windows.zip
